<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>CellRush</title>
<link rel="icon" href="data:," />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<canvas id="game"></canvas>
<div id="touch-stick" class="touch-stick"><div id="touch-stick-knob" class="touch-stick-knob"></div></div>
<div id="touch-controls" class="touch-controls" aria-hidden="true">
  <div class="touch-row touch-row-main">
    <button type="button" class="touch-btn touch-split" data-action="split">Split</button>
    <button type="button" class="touch-btn" data-action="eject">W</button>
  </div>
  <div class="touch-row touch-row-skills">
    <button type="button" class="touch-btn" data-skill="dash">Q</button>
    <button type="button" class="touch-btn" data-skill="shield">E</button>
    <button type="button" class="touch-btn" data-skill="magnet">R</button>
    <button type="button" class="touch-btn" data-skill="merge">F</button>
  </div>
</div>

<div id="menu" class="overlay menu-overlay">
  <div class="shell-panel">
    <section class="left-panel">
      <div class="panel-title">Skins</div>
      <div id="skins" class="skins">
        <button type="button" class="swatch sel" data-skin="" title="Pure">Pure</button>
        <button type="button" class="swatch" data-skin="/assets/skins/ring.svg" style="background-image:url('/assets/skins/ring.svg')" title="Ring">Ring</button>
        <button type="button" class="swatch" data-skin="/assets/skins/halo.svg" style="background-image:url('/assets/skins/halo.svg')" title="Halo">Halo</button>
        <button type="button" class="swatch" data-skin="/assets/skins/circles.svg" style="background-image:url('/assets/skins/circles.svg')" title="Circles">Cir</button>
        <button type="button" class="swatch" data-skin="/assets/skins/wolf.svg" style="background-image:url('/assets/skins/wolf.svg')" title="Wolf">Wolf</button>
        <button type="button" class="swatch" data-skin="/assets/skins/dragon.svg" style="background-image:url('/assets/skins/dragon.svg')" title="Dragon">Drag</button>
        <button type="button" class="swatch" data-skin="/assets/skins/magatama.svg" style="background-image:url('/assets/skins/magatama.svg')" title="Magatama">Mag</button>
        <button type="button" class="swatch" data-skin="/assets/skins/ghost.svg" style="background-image:url('/assets/skins/ghost.svg')" title="Ghost">Ghost</button>
        <button type="button" class="swatch" data-skin="/assets/skins/bat.svg" style="background-image:url('/assets/skins/bat.svg')" title="Bat">Bat</button>
        <button type="button" class="swatch" data-skin="/assets/skins/daemon.svg" style="background-image:url('/assets/skins/daemon.svg')" title="Daemon">Dae</button>
        <button type="button" class="swatch" data-skin="/assets/skins/star.svg" style="background-image:url('/assets/skins/star.svg')" title="Star">Star</button>
      </div>
    </section>

    <section class="middle-panel">
      <div class="panel-title brand-title">CellRush</div>
      <div class="avatar-preview" id="avatar-preview"></div>
      <input id="name" class="menu-input name-input" maxlength="14" placeholder="Nickname" autocomplete="off" spellcheck="false" />
      <input id="skin-url" class="menu-input skin-input" maxlength="256" placeholder="Skin image URL or local path" autocomplete="off" spellcheck="false" />
      <button id="play" class="menu-button play-button">Play</button>
      <div id="neterr" class="neterr hidden"></div>
      <div class="help"><b>Mouse</b> move - <b>Space</b> split - <b>W</b> eject - <b>Q/E/R/F</b> skills</div>
    </section>

    <section class="right-panel">
      <div class="panel-title">Rooms</div>
      <div class="server-options">
        <button class="server-pill active">Shanghai</button>
        <button class="server-pill">Local</button>
      </div>
      <ul class="room-list">
        <li class="active"><span>Default Room</span><b>Online</b></li>
        <li><span>Practice Room</span><b>Bots</b></li>
      </ul>
    </section>
  </div>
</div>

<div id="death" class="overlay hidden">
  <div class="dialog-panel">
    <h2>You were eaten</h2>
    <div id="death-stats" class="stats"></div>
    <button id="respawn" class="menu-button play-button">Respawn</button>
  </div>
</div>

<button id="gear" title="Settings (Esc)">S</button>
<div id="settings" class="overlay hidden">
  <div class="settings-panel">
    <nav class="settings-nav">
      <button class="active">View</button>
      <button>Control</button>
      <button>Audio</button>
    </nav>
    <div class="settings-content">
      <h2>Settings</h2>
      <label class="row"><span>Sound</span><input type="checkbox" id="set-sound" /></label>
      <label class="row"><span>Names</span><input type="checkbox" id="set-names" /></label>
      <label class="row"><span>Minimap</span><input type="checkbox" id="set-minimap" /></label>
      <label class="row"><span>Admin mode<small>Invincible - no cooldown - [ ] mass</small></span><input type="checkbox" id="set-admin" /></label>
      <div class="set-help">Skills: <b>Q</b> Dash &nbsp; <b>E</b> Shield &nbsp; <b>R</b> Magnet &nbsp; <b>F</b> Merge</div>
      <button id="resume" class="menu-button play-button">Resume</button>
      <button id="tomenu" class="menu-button ghost">Main menu</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/util.js"></script>
<script src="js/world.js"></script>
<script src="js/input.js"></script>
<script src="js/audio.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/transport-net.js"></script>
<script src="js/main.js"></script>
</body>
</html>
